<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Iniciar Sesion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm">
    <h1 class="text-xl font-semibold mb-6 text-center text-gray-800">Panel de Administracion</h1>
    <form id="login-form" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Correo</label>
        <input type="email" id="email" required class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="correo@ejemplo.com">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Contrasena</label>
        <input type="password" id="password" required class="w-full border rounded-lg px-3 py-2 text-sm" placeholder="********">
      </div>
      <button type="submit" id="submit-btn" class="w-full bg-gray-900 text-white rounded-lg py-2 text-sm font-medium hover:bg-gray-700 transition">Iniciar sesion</button>
      <p id="error-msg" class="text-red-600 text-xs text-center hidden"></p>
    </form>
  </div>

  <script>
    const supabaseUrl = 'https://vfspninncrmvsbjzygnm.supabase.co';
    const supabaseKey = 'sb_publishable_xfOz5c2O9YFezzUSZKbI3Q_nWT6EnLN';
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function checkSession() {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        window.location.href = 'dashboard.html';
      }
    }
    checkSession();

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Ingresando...';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      const { error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = 'Correo o contrasena incorrectos.';
        errorMsg.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Iniciar sesion';
      } else {
        window.location.href = 'dashboard.html';
      }
    });
  </script>
</body>
</html>
