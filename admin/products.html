<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - Productos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<header class="bg-gray-900 text-white px-6 py-4 flex justify-between items-center">
<div class="flex items-center gap-6">
<h1 class="text-lg font-semibold">Panel de Administracion</h1>
<nav class="flex gap-4 text-sm text-gray-300">
<a href="dashboard.html" class="hover:text-white">Dashboard</a>
<a href="users.html" class="hover:text-white">Usuarios</a>
<a href="products.html" class="text-white font-medium">Productos</a>
<a href="blog.html" class="hover:text-white">Blog</a>
<a href="contenido-visual.html" class="hover:text-white">Imagenes</a>
</nav>
</div>
<div class="flex items-center gap-4">
<span id="user-email" class="text-sm text-gray-300"></span>
<button id="logout-btn" class="bg-gray-700 hover:bg-gray-600 text-sm px-3 py-1.5 rounded-lg">Cerrar sesion</button>
</div>
</header>

<main class="p-8 max-w-5xl mx-auto space-y-8">
<section class="bg-white rounded-2xl shadow p-6">
<h2 id="form-title" class="text-lg font-semibold mb-4 text-gray-800">Agregar nuevo producto</h2>
<form id="product-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
<input type="hidden" id="product-id">
<div>
<label class="block text-xs font-medium text-gray-600 mb-1">Nombre</label>
<input type="text" id="nombre" required class="w-full border rounded-lg px-3 py-2 text-sm">
</div>
<div>
<label class="block text-xs font-medium text-gray-600 mb-1">Categoria</label>
<input type="text" id="categoria" class="w-full border rounded-lg px-3 py-2 text-sm">
</div>
<div>
<label class="block text-xs font-medium text-gray-600 mb-1">Badge</label>
<input type="text" id="badge" class="w-full border rounded-lg px-3 py-2 text-sm">
</div>
<div>
<label class="block text-xs font-medium text-gray-600 mb-1">Emoji (respaldo si no hay imagen)</label>
<input type="text" id="emoji_icono" class="w-full border rounded-lg px-3 py-2 text-sm">
</div>
<div class="md:col-span-2">
<label class="block text-xs font-medium text-gray-600 mb-1">Descripcion</label>
<textarea id="descripcion" rows="3" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea>
</div>
<div class="md:col-span-2">
<label class="block text-xs font-medium text-gray-600 mb-1">Caracteristicas (una por linea)</label>
<textarea id="caracteristicas" rows="4" class="w-full border rounded-lg px-3 py-2 text-sm"></textarea>
</div>
<div>
<label class="block text-xs font-medium text-gray-600 mb-1">Medidas</label>
<input type="text" id="medidas" class="w-full border rounded-lg px-3 py-2 text-sm">
</div>
<div>
<label class="block text-xs font-medium text-gray-600 mb-1">Orden</label>
<input type="number" id="orden" value="0" class="w-full border rounded-lg px-3 py-2 text-sm">
</div>
<div class="flex items-center gap-2">
<input type="checkbox" id="activo" checked class="w-4 h-4">
<label for="activo" class="text-sm text-gray-700">Activo (visible en el sitio)</label>
</div>
<div>
<label class="block text-xs font-medium text-gray-600 mb-1">Imagen del producto</label>
<input type="file" id="imagen-input" accept="image/*" class="w-full text-sm">
<div id="imagen-preview" class="mt-2 text-xs text-gray-500"></div>
<button type="button" id="quitar-imagen-btn" class="hidden mt-2 text-xs text-red-600 hover:underline">Quitar imagen (usar emoji)</button>
</div>
<div class="md:col-span-2 flex gap-3">
<button type="submit" id="submit-btn" class="bg-gray-900 text-white rounded-lg px-5 py-2 text-sm font-medium hover:bg-gray-700">Guardar producto</button>
<button type="button" id="cancel-edit-btn" class="hidden text-sm text-gray-600 hover:underline">Cancelar edicion</button>
</div>
<p id="form-msg" class="md:col-span-2 text-xs hidden"></p>
</form>
</section>

<section class="bg-white rounded-2xl shadow p-6">
<h2 class="text-lg font-semibold mb-4 text-gray-800">Catalogo de productos</h2>
<p id="list-msg" class="text-xs text-gray-500 mb-2 hidden"></p>
<div id="products-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
</section>
</main>

<script>
const supabaseUrl = 'https://vfspninncrmvsbjzygnm.supabase.co';
const supabaseKey = 'sb_publishable_xfOz5c2O9YFezzUSZKbI3Q_nWT6EnLN';
const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
const BUCKET = 'productos-imagenes';
let pendingImageFile = null;
let removeImageFlag = false;

async function init() {
const { data } = await supabaseClient.auth.getSession();
if (!data.session) {
window.location.href = 'login.html';
return;
}
document.getElementById('user-email').textContent = data.session.user.email;
loadProducts();
}
init();

document.getElementById('logout-btn').addEventListener('click', async () => {
await supabaseClient.auth.signOut();
window.location.href = 'login.html';
});

function publicUrl(path) {
if (!path) return null;
const { data } = supabaseClient.storage.from(BUCKET).getPublicUrl(path);
return data.publicUrl;
}

function optimizeImage(file, maxDim, quality) {
return new Promise((resolve, reject) => {
const reader = new FileReader();
reader.onload = (e) => {
const img = new Image();
img.onload = () => {
let w = img.width, h = img.height;
if (w > maxDim || h > maxDim) {
if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
else { w = Math.round(w * maxDim / h); h = maxDim; }
}
const canvas = document.createElement('canvas');
canvas.width = w; canvas.height = h;
canvas.getContext('2d').drawImage(img, 0, 0, w, h);
const type = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
canvas.toBlob((blob) => resolve({ blob, type }), type, quality);
};
img.onerror = reject;
img.src = e.target.result;
};
reader.onerror = reject;
reader.readAsDataURL(file);
});
}

document.getElementById('imagen-input').addEventListener('change', (e) => {
pendingImageFile = e.target.files[0] || null;
removeImageFlag = false;
const preview = document.getElementById('imagen-preview');
preview.textContent = pendingImageFile ? ('Seleccionada: ' + pendingImageFile.name) : '';
});

document.getElementById('quitar-imagen-btn').addEventListener('click', () => {
removeImageFlag = true;
pendingImageFile = null;
document.getElementById('imagen-input').value = '';
document.getElementById('imagen-preview').textContent = 'Se quitara la imagen al guardar (se mostrara el emoji).';
});

function resetForm() {
document.getElementById('product-form').reset();
document.getElementById('product-id').value = '';
document.getElementById('form-title').textContent = 'Agregar nuevo producto';
document.getElementById('submit-btn').textContent = 'Guardar producto';
document.getElementById('cancel-edit-btn').classList.add('hidden');
document.getElementById('quitar-imagen-btn').classList.add('hidden');
document.getElementById('imagen-preview').textContent = '';
pendingImageFile = null;
removeImageFlag = false;
}

document.getElementById('cancel-edit-btn').addEventListener('click', resetForm);

async function loadProducts() {
const listMsg = document.getElementById('list-msg');
const list = document.getElementById('products-list');
listMsg.textContent = 'Cargando...';
listMsg.classList.remove('hidden');

const { data, error } = await supabaseClient.from('productos').select('*').order('orden', { ascending: true });

if (error) {
listMsg.textContent = 'Error al cargar productos.';
return;
}
listMsg.classList.add('hidden');
list.innerHTML = '';

data.forEach((p) => {
const card = document.createElement('div');
card.className = 'border rounded-xl p-4 flex flex-col gap-2';

const thumb = document.createElement('div');
thumb.className = 'h-32 rounded-lg flex items-center justify-center text-5xl bg-gray-50 overflow-hidden';
if (p.imagen_url) {
const img = document.createElement('img');
img.src = publicUrl(p.imagen_url);
img.className = 'w-full h-full object-cover';
thumb.appendChild(img);
} else {
thumb.textContent = p.emoji_icono || '📦';
}

const nombre = document.createElement('div');
nombre.className = 'font-medium text-sm text-gray-800';
nombre.textContent = p.nombre;

const meta = document.createElement('div');
meta.className = 'text-xs text-gray-500';
meta.textContent = (p.categoria || '') + (p.activo ? '' : ' · INACTIVO');

const actions = document.createElement('div');
actions.className = 'flex gap-3 mt-1';
const editBtn = document.createElement('button');
editBtn.textContent = 'Editar';
editBtn.className = 'text-xs text-blue-600 hover:underline';
editBtn.addEventListener('click', () => editProduct(p));
const delBtn = document.createElement('button');
delBtn.textContent = 'Eliminar';
delBtn.className = 'text-xs text-red-600 hover:underline';
delBtn.addEventListener('click', () => deleteProduct(p));
actions.appendChild(editBtn);
actions.appendChild(delBtn);

card.appendChild(thumb);
card.appendChild(nombre);
card.appendChild(meta);
card.appendChild(actions);
list.appendChild(card);
});
}

function editProduct(p) {
document.getElementById('product-id').value = p.id;
document.getElementById('nombre').value = p.nombre || '';
document.getElementById('categoria').value = p.categoria || '';
document.getElementById('badge').value = p.badge || '';
document.getElementById('emoji_icono').value = p.emoji_icono || '';
document.getElementById('descripcion').value = p.descripcion || '';
document.getElementById('caracteristicas').value = (p.caracteristicas || []).join('\n');
document.getElementById('medidas').value = p.medidas || '';
document.getElementById('orden').value = p.orden || 0;
document.getElementById('activo').checked = !!p.activo;
document.getElementById('form-title').textContent = 'Editar producto';
document.getElementById('submit-btn').textContent = 'Actualizar producto';
document.getElementById('cancel-edit-btn').classList.remove('hidden');
document.getElementById('quitar-imagen-btn').classList.toggle('hidden', !p.imagen_url);
document.getElementById('imagen-preview').textContent = p.imagen_url ? 'Imagen actual guardada. Sube una nueva para reemplazarla.' : '';
pendingImageFile = null;
removeImageFlag = false;
window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteProduct(p) {
if (!confirm('¿Eliminar el producto "' + p.nombre + '"? Esta accion no se puede deshacer.')) return;
if (p.imagen_url) {
await supabaseClient.storage.from(BUCKET).remove([p.imagen_url]);
}
const { error } = await supabaseClient.from('productos').delete().eq('id', p.id);
if (error) {
alert('No se pudo eliminar el producto.');
} else {
loadProducts();
}
}

document.getElementById('product-form').addEventListener('submit', async (e) => {
e.preventDefault();
const formMsg = document.getElementById('form-msg');
const submitBtn = document.getElementById('submit-btn');
formMsg.classList.add('hidden');
submitBtn.disabled = true;
submitBtn.textContent = 'Guardando...';

const id = document.getElementById('product-id').value;
const caracteristicas = document.getElementById('caracteristicas').value.split('\n').map(s => s.trim()).filter(Boolean);

const payload = {
nombre: document.getElementById('nombre').value.trim(),
categoria: document.getElementById('categoria').value.trim(),
badge: document.getElementById('badge').value.trim(),
emoji_icono: document.getElementById('emoji_icono').value.trim(),
descripcion: document.getElementById('descripcion').value.trim(),
caracteristicas: caracteristicas,
medidas: document.getElementById('medidas').value.trim(),
orden: parseInt(document.getElementById('orden').value, 10) || 0,
activo: document.getElementById('activo').checked
};

try {
if (removeImageFlag && id) {
const { data: current } = await supabaseClient.from('productos').select('imagen_url').eq('id', id).single();
if (current && current.imagen_url) {
await supabaseClient.storage.from(BUCKET).remove([current.imagen_url]);
}
payload.imagen_url = null;
}

if (pendingImageFile) {
const opt = await optimizeImage(pendingImageFile, 1600, 0.82);
const ext = opt.type === 'image/png' ? 'png' : 'jpg';
const path = (id || 'nuevo-' + Date.now()) + '-' + Date.now() + '.' + ext;
const { error: upErr } = await supabaseClient.storage.from(BUCKET).upload(path, opt.blob, { upsert: true, contentType: opt.type });
if (upErr) throw upErr;
payload.imagen_url = path;
}

let saveError;
if (id) {
const { error } = await supabaseClient.from('productos').update(payload).eq('id', id);
saveError = error;
} else {
const { error } = await supabaseClient.from('productos').insert(payload);
saveError = error;
}
if (saveError) throw saveError;

formMsg.textContent = 'Producto guardado correctamente.';
formMsg.className = 'md:col-span-2 text-xs text-green-600';
formMsg.classList.remove('hidden');
resetForm();
loadProducts();
} catch (err) {
formMsg.textContent = 'Error al guardar: ' + (err.message || 'intenta de nuevo.');
formMsg.className = 'md:col-span-2 text-xs text-red-600';
formMsg.classList.remove('hidden');
} finally {
submitBtn.disabled = false;
submitBtn.textContent = id ? 'Actualizar producto' : 'Guardar producto';
}
});
</script>
</body>
</html>
